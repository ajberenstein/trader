version: '3.8'

services:
  trader-mcp:
    build: .
    container_name: trader-mcp-server
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs
    networks:
      - trader-network

networks:
  trader-network:
    driver: bridge

volumes:
  trader-logs:
    driver: local